<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Telegram Parser Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(30,41,59,0.8);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 400px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: #0f172a;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #22c55e;
            font-weight: bold;
            cursor: pointer;
            color: black;
        }

        button:hover {
            background: #16a34a;
        }

        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #38bdf8;
            min-height: 30px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Telegram Parser Demo</h2>
    <input type="text" id="channel" placeholder="Введите канал или группу">
    <button onclick="startParse()">🚀 Начать парсинг</button>
    <div id="status"></div>
</div>

<script>
function startParse() {
    const channel = document.getElementById("channel").value;
    const status = document.getElementById("status");

    if (!channel) {
        alert("Введите ссылку или username канала!");
        return;
    }

    // 🔹 Здесь имитация ответа с сервера
    const result = {
        success: true,
        users: Math.floor(Math.random() * 1000) // случайное число для демо
    };

    // 🔹 Проверенный способ — берём конкретное поле, а не весь объект
    status.innerText = `✅ Готово!\nСобрано пользователей: ${result.users}`;
}
</script>

</body>
</html>
